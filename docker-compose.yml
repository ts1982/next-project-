version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: next-project-postgres
    restart: always
    environment:
      POSTGRES_DB: nextdb
      POSTGRES_USER: nextuser
      POSTGRES_PASSWORD: nextpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextuser -d nextdb"]
      timeout: 20s
      retries: 10

volumes:
  postgres_data:
