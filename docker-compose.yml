services:
  db:
    image: postgres:17
    container_name: next-project-postgres
    restart: always
    environment:
      POSTGRES_DB: nextdb
      POSTGRES_USER: nextuser
      POSTGRES_PASSWORD: nextpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextuser -d nextdb"]
      timeout: 20s
      retries: 10

  # 配信予定の通知を毎分チェックして配信する cron ジョブ
  cron:
    image: alpine:3.19
    environment:
      CRON_SECRET: ${CRON_SECRET:-change-this-cron-secret}
    # apk で curl をインストールし、1 分おきに deliver エンドポイントを呼び出す
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl
        while true; do
          curl -sf -H "Authorization: Bearer $$CRON_SECRET" http://host.docker.internal:3000/api/cron/deliver || true
          sleep 60
        done
    restart: unless-stopped

volumes:
  postgres_data:
