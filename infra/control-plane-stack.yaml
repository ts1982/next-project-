AWSTemplateFormatVersion: "2010-09-09"
Description: >
  next-project Control Plane — Lambda (start/stop) + EventBridge Scheduler
  for manual start/stop and auto-stop after 5 hours.

Parameters:
  ProjectName:
    Type: String
    Default: next-project
  EdgeTemplateS3URL:
    Type: String
    Description: "S3 URL of the edge-stack.yaml template (e.g. https://s3.ap-northeast-1.amazonaws.com/bucket/edge-stack.yaml)"
  AutoStopHours:
    Type: Number
    Default: 5
    Description: "Hours after start to auto-stop"

Resources:

  # ----------------------------------------------------------
  # Lambda Execution Role
  # ----------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-exec-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: StartStopAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # RDS start/stop
              - Effect: Allow
                Action:
                  - rds:StartDBInstance
                  - rds:StopDBInstance
                  - rds:DescribeDBInstances
                Resource: !Sub "arn:aws:rds:${AWS::Region}:${AWS::AccountId}:db:${ProjectName}-db"
              # CloudFormation manage edge stack
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-edge/*"
              # ECS (for CloudFormation to create/update/delete services)
              - Effect: Allow
                Action:
                  - ecs:CreateService
                  - ecs:UpdateService
                  - ecs:DeleteService
                  - ecs:DescribeServices
                  - ecs:RunTask
                  - ecs:StopTask
                  - ecs:DescribeTasks
                Resource: "*"
                Condition:
                  ArnLike:
                    ecs:cluster: !ImportValue
                      Fn::Sub: "${ProjectName}-ECSClusterArn"
              # IAM PassRole (for ECS tasks created by CFn + Scheduler)
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !ImportValue
                    Fn::Sub: "${ProjectName}-ECSTaskExecRoleArn"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-ecs-task-role"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-eventbridge-ecs-role"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-scheduler-role"
              # ELB (for CFn to create/delete ALB, TG, Listeners)
              - Effect: Allow
                Action:
                  - elasticloadbalancing:*
                Resource: "*"
              # Route53 (for CFn to create/delete alias records)
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                Resource:
                  - !Sub
                    - "arn:aws:route53:::hostedzone/${ZoneId}"
                    - ZoneId: !ImportValue
                        Fn::Sub: "${ProjectName}-HostedZoneId"
              - Effect: Allow
                Action:
                  - route53:GetChange
                Resource: "arn:aws:route53:::change/*"
              # EC2 (SG / Subnet / VPC lookups by CFn + ALB creation)
              - Effect: Allow
                Action:
                  - ec2:Describe*
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteNetworkInterface
                Resource: "*"
              # IAM CreateServiceLinkedRole (for first-time ALB creation)
              - Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: "arn:aws:iam::*:role/aws-service-role/elasticloadbalancing.amazonaws.com/*"
                Condition:
                  StringEquals:
                    iam:AWSServiceName: elasticloadbalancing.amazonaws.com
              # EventBridge Scheduler (create/delete auto-stop schedule)
              - Effect: Allow
                Action:
                  - scheduler:CreateSchedule
                  - scheduler:DeleteSchedule
                  - scheduler:GetSchedule
                Resource: !Sub "arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/${ProjectName}-auto-stop"
              # EventBridge Rules (enable/disable cron rule — created by edge stack)
              - Effect: Allow
                Action:
                  - events:EnableRule
                  - events:DisableRule
                  - events:PutRule
                  - events:PutTargets
                  - events:RemoveTargets
                  - events:DeleteRule
                  - events:DescribeRule
                Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/${ProjectName}-cron-rule"
              # S3 GetObject for edge template
              - Effect: Allow
                Action: s3:GetObject
                Resource: "*"
              # IAM for CFn to manage roles in edge stack
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-eventbridge-ecs-role"

  # ----------------------------------------------------------
  # Scheduler Role (EventBridge Scheduler → Lambda invoke)
  # ----------------------------------------------------------
  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-scheduler-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt StopLambda.Arn

  # ----------------------------------------------------------
  # Start Lambda
  # ----------------------------------------------------------
  StartLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-start"
      Runtime: python3.12
      Handler: start.handler
      Code:
        S3Bucket: !Sub "${ProjectName}-lambda-deploy"
        S3Key: lambda/start.zip
      Timeout: 900
      MemorySize: 128
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          PROJECT_NAME: !Ref ProjectName
          RDS_INSTANCE_ID: !ImportValue
            Fn::Sub: "${ProjectName}-RDSInstanceId"
          EDGE_TEMPLATE_URL: !Ref EdgeTemplateS3URL
          AUTO_STOP_HOURS: !Ref AutoStopHours
          STOP_LAMBDA_ARN: !GetAtt StopLambda.Arn
          SCHEDULER_ROLE_ARN: !GetAtt SchedulerRole.Arn

  # ----------------------------------------------------------
  # Stop Lambda
  # ----------------------------------------------------------
  StopLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-stop"
      Runtime: python3.12
      Handler: stop.handler
      Code:
        S3Bucket: !Sub "${ProjectName}-lambda-deploy"
        S3Key: lambda/stop.zip
      Timeout: 900
      MemorySize: 128
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          PROJECT_NAME: !Ref ProjectName
          RDS_INSTANCE_ID: !ImportValue
            Fn::Sub: "${ProjectName}-RDSInstanceId"

  # Permission for EventBridge Scheduler to invoke stop Lambda
  StopLambdaSchedulerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StopLambda
      Action: lambda:InvokeFunction
      Principal: scheduler.amazonaws.com
      SourceArn: !Sub "arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/${ProjectName}-auto-stop"

Outputs:
  StartLambdaArn:
    Value: !GetAtt StartLambda.Arn
    Description: "Invoke this Lambda to start the environment"
  StopLambdaArn:
    Value: !GetAtt StopLambda.Arn
    Description: "Invoke this Lambda to stop the environment"
  StartCommand:
    Value: !Sub "aws lambda invoke --function-name ${ProjectName}-start /dev/stdout"
    Description: "CLI command to start the environment"
  StopCommand:
    Value: !Sub "aws lambda invoke --function-name ${ProjectName}-stop /dev/stdout"
    Description: "CLI command to stop the environment"
