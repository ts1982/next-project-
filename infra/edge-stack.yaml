AWSTemplateFormatVersion: "2010-09-09"
Description: >
  next-project Edge Stack — created on start, deleted on stop.
  ALB / Target Groups / Listeners / ECS Services / Route53 Alias records.

# ============================================================
# Parameters
# ============================================================
Parameters:
  ProjectName:
    Type: String
    Default: next-project

# ============================================================
# Resources
# ============================================================
Resources:

  # ----------------------------------------------------------
  # Application Load Balancer (Single-AZ, Public)
  # ----------------------------------------------------------
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ProjectName}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue
          Fn::Sub: "${ProjectName}-PublicSubnetId"
        - !ImportValue
          Fn::Sub: "${ProjectName}-PublicSubnet2Id"
      SecurityGroups:
        - !ImportValue
          Fn::Sub: "${ProjectName}-ALBSecurityGroupId"
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: "120"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-alb"

  # ----------------------------------------------------------
  # Target Groups
  # ----------------------------------------------------------
  AdminTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ProjectName}-admin-tg"
      Port: 3000
      Protocol: HTTP
      VpcId: !ImportValue
        Fn::Sub: "${ProjectName}-VPCId"
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"

  UserTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ProjectName}-user-tg"
      Port: 3001
      Protocol: HTTP
      VpcId: !ImportValue
        Fn::Sub: "${ProjectName}-VPCId"
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: stickiness.enabled
          Value: "true"
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: "86400"

  # ----------------------------------------------------------
  # Listeners
  # ----------------------------------------------------------
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !ImportValue
            Fn::Sub: "${ProjectName}-CertificateArn"
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            ContentType: text/plain
            MessageBody: "Not Found"
            StatusCode: "404"

  # Host-based routing: admin.<domain>
  AdminListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HTTPSListener
      Priority: 10
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Sub
                - "admin.${Domain}"
                - Domain: !ImportValue
                    Fn::Sub: "${ProjectName}-DomainName"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AdminTargetGroup

  # Host-based routing: app.<domain> (user HTTP + WS on same port)
  UserListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HTTPSListener
      Priority: 20
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Sub
                - "app.${Domain}"
                - Domain: !ImportValue
                    Fn::Sub: "${ProjectName}-DomainName"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref UserTargetGroup

  # ----------------------------------------------------------
  # Route53 Alias Records
  # ----------------------------------------------------------
  AdminDNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !ImportValue
        Fn::Sub: "${ProjectName}-HostedZoneId"
      Name: !Sub
        - "admin.${Domain}"
        - Domain: !ImportValue
            Fn::Sub: "${ProjectName}-DomainName"
      Type: A
      AliasTarget:
        DNSName: !GetAtt ALB.DNSName
        HostedZoneId: !GetAtt ALB.CanonicalHostedZoneID

  UserDNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !ImportValue
        Fn::Sub: "${ProjectName}-HostedZoneId"
      Name: !Sub
        - "app.${Domain}"
        - Domain: !ImportValue
            Fn::Sub: "${ProjectName}-DomainName"
      Type: A
      AliasTarget:
        DNSName: !GetAtt ALB.DNSName
        HostedZoneId: !GetAtt ALB.CanonicalHostedZoneID

  # ----------------------------------------------------------
  # ECS Services
  # ----------------------------------------------------------
  AdminService:
    Type: AWS::ECS::Service
    DependsOn:
      - AdminListenerRule
    Properties:
      ServiceName: !Sub "${ProjectName}-admin-svc"
      Cluster: !ImportValue
        Fn::Sub: "${ProjectName}-ECSClusterArn"
      TaskDefinition: !Sub "${ProjectName}-admin"
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !ImportValue
              Fn::Sub: "${ProjectName}-PublicSubnetId"
          SecurityGroups:
            - !ImportValue
              Fn::Sub: "${ProjectName}-FargateSecurityGroupId"
      LoadBalancers:
        - ContainerName: admin
          ContainerPort: 3000
          TargetGroupArn: !Ref AdminTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200

  UserService:
    Type: AWS::ECS::Service
    DependsOn:
      - UserListenerRule
    Properties:
      ServiceName: !Sub "${ProjectName}-user-svc"
      Cluster: !ImportValue
        Fn::Sub: "${ProjectName}-ECSClusterArn"
      TaskDefinition: !Sub "${ProjectName}-user"
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !ImportValue
              Fn::Sub: "${ProjectName}-PublicSubnetId"
          SecurityGroups:
            - !ImportValue
              Fn::Sub: "${ProjectName}-FargateSecurityGroupId"
      LoadBalancers:
        - ContainerName: user
          ContainerPort: 3001
          TargetGroupArn: !Ref UserTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200

  # ----------------------------------------------------------
  # NAT Gateway（Lambda がインターネットへアクセスするため）
  # AZ 整合注意: NATGateway は PublicSubnetId（AZ a = index 0）に配置。
  #   Lambda も PrivateSubnet1Id（同じ AZ a = index 0）を使用するためクロスAZ通信は発生しない。
  #   将来別 AZ のサブネットを追加する場合はその AZ の PublicSubnet に別第 NAT を追加すること。
  # ----------------------------------------------------------
  NATElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-nat-eip"

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATElasticIP.AllocationId
      SubnetId: !ImportValue
        Fn::Sub: "${ProjectName}-PublicSubnetId"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-nat-gw"

  NATRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !ImportValue
        Fn::Sub: "${ProjectName}-PrivateRouteTableId"
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NATGateway

  # ----------------------------------------------------------
  # Notification Delivery Lambda（予約通知を配信する）
  # ----------------------------------------------------------
  NotificationDeliveryLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-notification-delivery"
      PackageType: Image
      Code:
        ImageUri: !Sub
          - "${ECRUri}:latest"
          - ECRUri: !ImportValue
              Fn::Sub: "${ProjectName}-NotificationLambdaECRUri"
      Role: !ImportValue
        Fn::Sub: "${ProjectName}-NotificationLambdaRoleArn"
      Timeout: 300
      MemorySize: 256
      VpcConfig:
        SubnetIds:
          - !ImportValue
            Fn::Sub: "${ProjectName}-PrivateSubnet1Id"
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${ProjectName}-LambdaSecurityGroupId"
      Environment:
        Variables:
          DATABASE_URL: !Sub "{{resolve:ssm:/${ProjectName}/DATABASE_URL}}"
          USER_APP_URL: !Sub "{{resolve:ssm:/${ProjectName}/USER_APP_URL}}"
          INTERNAL_API_SECRET: !Sub "{{resolve:ssm:/${ProjectName}/INTERNAL_API_SECRET}}"
      LoggingConfig:
        LogGroup: !Sub "/lambda/${ProjectName}/notification-delivery"

  # CronScheduleRule / EventBridgeECSRole は削除
  # （EventBridge Scheduler + Lambda 方式へ移行）

# ============================================================
# Outputs
# ============================================================
Outputs:
  ALBDnsName:
    Value: !GetAtt ALB.DNSName
  AdminURL:
    Value: !Sub
      - "https://admin.${Domain}"
      - Domain: !ImportValue
          Fn::Sub: "${ProjectName}-DomainName"
  UserURL:
    Value: !Sub
      - "https://app.${Domain}"
      - Domain: !ImportValue
          Fn::Sub: "${ProjectName}-DomainName"
