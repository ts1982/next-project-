name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - admin
          - user

env:
  AWS_REGION: ap-northeast-1
  PROJECT_NAME: next-project

jobs:
  # ============================================================
  # Build & Push Docker images to ECR
  # ============================================================
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      admin_image: ${{ steps.meta.outputs.admin_image }}
      user_image: ${{ steps.meta.outputs.user_image }}
      notification_lambda_image: ${{ steps.meta.outputs.notification_lambda_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: meta
        run: |
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          SHA=${GITHUB_SHA::8}
          echo "admin_image=${REGISTRY}/${PROJECT_NAME}/admin:${SHA}" >> "$GITHUB_OUTPUT"
          echo "user_image=${REGISTRY}/${PROJECT_NAME}/user:${SHA}" >> "$GITHUB_OUTPUT"
          echo "notification_lambda_image=${REGISTRY}/${PROJECT_NAME}/notification-lambda:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- admin ----
      - name: Build & push admin
        if: inputs.deploy_target == 'all' || inputs.deploy_target == 'admin' || github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.admin
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.admin_image }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- user ----
      - name: Build & push user
        if: inputs.deploy_target == 'all' || inputs.deploy_target == 'user' || github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.user
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.user_image }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/user:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- notification-lambda ----
      # provenance: false は Lambda Container Image の OCI manifest list 非対応を回避するため必須
      - name: Build & push notification-lambda
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.notification-lambda
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.notification_lambda_image }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/notification-lambda:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Update ECS task definitions with new images
  # ============================================================
  deploy:
    needs: [build-and-push, migrate]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update admin task definition
        if: inputs.deploy_target == 'all' || inputs.deploy_target == 'admin' || github.event_name == 'push'
        run: |
          # Get current task def, update image, register new revision
          TASK_DEF=$(aws ecs describe-task-definition --task-definition ${PROJECT_NAME}-admin --query taskDefinition)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMG "${{ needs.build-and-push.outputs.admin_image }}" \
            '.containerDefinitions[0].image = $IMG | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF"

      - name: Update user task definition
        if: inputs.deploy_target == 'all' || inputs.deploy_target == 'user' || github.event_name == 'push'
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition ${PROJECT_NAME}-user --query taskDefinition)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMG "${{ needs.build-and-push.outputs.user_image }}" \
            '.containerDefinitions[0].image = $IMG | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF"

      - name: Clean up failed edge-stack if needed
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name ${PROJECT_NAME}-edge \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STACK_STATUS" = "CREATE_FAILED" ]; then
            echo "Stack in $STACK_STATUS state, deleting..."
            aws cloudformation delete-stack --stack-name ${PROJECT_NAME}-edge
            aws cloudformation wait stack-delete-complete --stack-name ${PROJECT_NAME}-edge
            echo "Stack deleted successfully"
          elif [ "$STACK_STATUS" = "DELETE_IN_PROGRESS" ]; then
            echo "Stack deletion in progress, waiting..."
            aws cloudformation wait stack-delete-complete --stack-name ${PROJECT_NAME}-edge
          fi

      - name: Deploy edge-stack (create or update)
        run: |
          aws cloudformation deploy \
            --stack-name ${PROJECT_NAME}-edge \
            --template-file infra/edge-stack.yaml \
            --parameter-overrides ProjectName=${PROJECT_NAME} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${PROJECT_NAME}-notification-delivery \
            --image-uri "${{ needs.build-and-push.outputs.notification_lambda_image }}" \
            --no-cli-pager
          echo "Lambda function code updated"

      - name: Sync infra templates to S3
        run: |
          aws s3 cp infra/edge-stack.yaml s3://${PROJECT_NAME}-lambda-deploy/edge-stack.yaml
          cd infra/lambda
          zip -j /tmp/start.zip start.py
          zip -j /tmp/stop.zip stop.py
          aws s3 cp /tmp/start.zip s3://${PROJECT_NAME}-lambda-deploy/lambda/start.zip
          aws s3 cp /tmp/stop.zip s3://${PROJECT_NAME}-lambda-deploy/lambda/stop.zip

      - name: Force new deployment (if services are running)
        run: |
          # Only force deploy if services exist and are running
          for SVC in admin-svc user-svc; do
            STATUS=$(aws ecs describe-services \
              --cluster ${PROJECT_NAME}-cluster \
              --services ${PROJECT_NAME}-${SVC} \
              --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
            if [ "$STATUS" = "ACTIVE" ]; then
              echo "Deploying ${SVC}..."
              aws ecs update-service \
                --cluster ${PROJECT_NAME}-cluster \
                --service ${PROJECT_NAME}-${SVC} \
                --force-new-deployment
            else
              echo "${SVC} not active (status: ${STATUS}), skipping"
            fi
          done

  # ============================================================
  # DB Migration (runs on every deploy)
  # ============================================================
  migrate:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Prisma migration via ECS RunTask
        run: |
          echo "Running prisma migrate deploy via ECS RunTask..."
          TASK_ARN=$(aws ecs run-task \
            --cluster ${PROJECT_NAME}-cluster \
            --task-definition ${PROJECT_NAME}-admin \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$(aws cloudformation describe-stacks --stack-name ${PROJECT_NAME}-base --query 'Stacks[0].Outputs[?OutputKey==`PublicSubnetId`].OutputValue' --output text)],securityGroups=[$(aws cloudformation describe-stacks --stack-name ${PROJECT_NAME}-base --query 'Stacks[0].Outputs[?OutputKey==`FargateSecurityGroupId`].OutputValue' --output text)],assignPublicIp=ENABLED}" \
            --overrides '{
              "containerOverrides": [{
                "name": "admin",
                "command": ["sh", "-c", "cd /app && npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma"]
              }]
            }' \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster ${PROJECT_NAME}-cluster --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster ${PROJECT_NAME}-cluster --tasks "$TASK_ARN" --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migration completed successfully"
